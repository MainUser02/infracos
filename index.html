<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инфракос — Официальный сайт</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="global-stars-wrapper">
        <div class="stars-layer stars-slow parallax-layer" data-speed="-1"></div>
        <div class="stars-layer stars-fast parallax-layer" data-speed="-2"></div>
    </div>

    <header class="header container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="white" width="28" height="28"><path d="M13.13 2.21a2.82 2.82 0 0 0-2.26 0 17.5 17.5 0 0 0-7.85 7.85c-.4.82.16 1.76 1.05 1.88l3.43.49c.84.12 1.54.73 1.75 1.55l.8 3.22c.22.9.11 1.86-.3 2.68l-1.37 2.75c-.38.75.24 1.62 1.08 1.54l4.24-.42c1.07-.11 2.03.49 2.5 1.45l1.6 3.2c.4 1 .07 2.19-.8 2.74a17.43 17.43 0 0 0 8.08-8.08c1.37-2.73 1.37-5.94 0-8.67a17.5 17.5 0 0 0-7.85-7.85z"/></svg>
        </div>
        
        <nav class="nav-menu" id="navMenu">
            <a href="#home" data-i18n="nav_home">Главная</a>
            <a href="#tourism" data-i18n="nav_tourism">Туризм</a>
            <a href="#procurement" data-i18n="nav_procurement">Госзакупки</a>
            <a href="#vacancies" data-i18n="nav_vacancies">Вакансии</a>
            <div class="dropdown">
                <span class="dropdown-title" data-i18n="nav_more">Еще ▾</span>
                <div class="dropdown-content">
                    <a href="#management" data-i18n="nav_management">Руководство</a>
                    <a href="#departments" data-i18n="nav_departments">Отделы</a>
                    <a href="#realization" data-i18n="nav_realization">Реализация</a>
                    <a href="#compliance" data-i18n="nav_compliance">Комплаенс</a>
                    <a href="#contacts" data-i18n="nav_contacts">Контакты</a>
                </div>
            </div>
        </nav>

        <div class="header-right">
            <div class="lang-switch" id="langSwitch">
                <span data-lang="kz">KZ</span>
                <span data-lang="ru" class="active">RU</span>
                <span data-lang="en">EN</span>
            </div>
            <a href="#tourism" class="btn btn-white hidden-mobile" data-i18n="btn_explore" style="text-decoration:none;">Исследовать</a>
            <div class="burger-menu" id="burgerMenu">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <main id="app-root"></main>

    <footer class="container text-center" style="padding: 40px 0; opacity: 0.6; position: relative; z-index: 10;">
        <p>&copy; 2026 РГП на ПХВ «Инфракос». infracos.kz</p>
    </footer>

    <template id="page-home">
        <section class="section hero-section container grid-2 align-center">
            <div class="text-content" style="position: relative; z-index: 10;">
                <h1 data-i18n="hero_title">Инфракос: Врата в Космическую Деятельность</h1>
                <p data-i18n="hero_desc">Обеспечение экологической безопасности ракетно-космической деятельности и развитие научно-исследовательской базы на комплексе «Байконур».</p>
                <div class="btns-group">
                    <a href="#tourism" class="btn btn-peach" data-i18n="btn_more" style="text-decoration:none;">Узнать больше</a>
                </div>
            </div>
            
            <div class="illustration-wrapper">
                <div class="parallax-layer" data-speed="1.5" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center;">
                    <div class="solar-system-group">
                        <div class="sun"></div>
                        <div class="orbit orbit-1"><div class="planet planet-1"></div></div>
                        <div class="orbit orbit-2"><div class="planet planet-2"></div></div>
                        <div class="orbit orbit-3"><div class="planet planet-3"><div class="moon"></div></div></div>
                        <div class="orbit orbit-4"><div class="planet planet-4"></div></div>
                        <div class="orbit orbit-5"><div class="planet planet-5"></div></div>
                        <div class="orbit orbit-6"><div class="planet planet-6"></div></div>
                        <div class="orbit orbit-7"><div class="planet planet-7"></div></div>
                        <div class="orbit orbit-8"><div class="planet planet-8"></div></div>
                        <div class="orbit orbit-9"><div class="planet planet-9"></div></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section container grid-2" style="position: relative; z-index: 10;">
            <div>
                <h2 data-i18n="title_news">Новости</h2>
                <div class="card">
                    <div class="badge">15.03.2026</div>
                    <h3 data-i18n="news_1">Итоги научной конференции</h3>
                    <p data-i18n="news_1_desc">Обсуждение новых методов эко-контроля.</p>
                </div>
            </div>
            <div>
                <h2 data-i18n="title_ads">Объявления</h2>
                <div class="card">
                    <div class="badge" style="background: var(--peach); color: var(--bg-main);" data-i18n="tag_tender">Закупки</div>
                    <h3 data-i18n="ad_1">План закупок на II квартал</h3>
                    <a href="#procurement" class="btn btn-white" data-i18n="btn_explore" style="margin-top:15px; display:inline-block; text-decoration:none;">Подробнее</a>
                </div>
            </div>
        </section>
    </template>

    <template id="page-tourism">
        <section class="section container" style="position: relative; z-index: 10;">
            <h1 data-i18n="page_tourism_title">Туризм на комплексе «Байконур»</h1>
            <div class="grid-2" style="margin-bottom: 50px;">
                <div class="card"><h3 data-i18n="tour_obj1">Стартовые площадки</h3><p>Посещение исторических мест запуска.</p></div>
                <div class="card"><h3 data-i18n="tour_obj2">Музей космонавтики</h3><p>Уникальные экспонаты освоения космоса.</p></div>
            </div>
            <h2 data-i18n="tour_price">Прайс-лист</h2>
            <div class="card p-0" style="padding: 0; overflow-x: auto;">
                <table class="data-table">
                    <tr><th data-i18n="table_service">Услуга</th><th>Стоимость</th></tr>
                    <tr><td data-i18n="price_1">Посещение визит-центра</td><td>5 000 ₸</td></tr>
                    <tr><td data-i18n="price_2">Выезд на стартовый комплекс</td><td>25 000 ₸</td></tr>
                </table>
            </div>
        </section>
    </template>

    <template id="page-procurement">
        <section class="section container" style="position: relative; z-index: 10;">
            <h1 data-i18n="nav_procurement">Государственные закупки</h1>
            <div class="card" style="padding: 0; overflow-x: auto;">
                <table class="data-table">
                    <tr><th>№</th><th>Наименование</th><th>Статус</th></tr>
                    <tr><td>1</td><td>Закупка лабораторного оборудования</td><td style="color: #4CAF50;">Активен</td></tr>
                    <tr><td>2</td><td>Услуги клининга визит-центра</td><td style="color: #FF9800;">Завершен</td></tr>
                </table>
            </div>
        </section>
    </template>

    <template id="page-vacancies">
        <section class="section container" style="position: relative; z-index: 10;">
            <h1 data-i18n="nav_vacancies">Вакансии</h1>
            <div class="card">
                <h3>Инженер-эколог</h3>
                <p>Требования: высшее образование, опыт работы от 3 лет, знание экологического законодательства РК.</p>
                <button class="btn btn-peach" style="margin-top: 15px;">Откликнуться</button>
            </div>
        </section>
    </template>

    <template id="page-management"><section class="section container" style="position: relative; z-index: 10;"><h1 data-i18n="nav_management">Руководство</h1><div class="card"><p>Информация о руководстве предприятия.</p></div></section></template>
    <template id="page-departments"><section class="section container" style="position: relative; z-index: 10;"><h1 data-i18n="nav_departments">Отделы</h1><div class="card"><p>Научно-исследовательский отдел, Отдел туризма и др.</p></div></section></template>
    <template id="page-realization"><section class="section container" style="position: relative; z-index: 10;"><h1 data-i18n="nav_realization">Реализация</h1><div class="card"><p>Реализация активов предприятия.</p></div></section></template>
    <template id="page-compliance"><section class="section container" style="position: relative; z-index: 10;"><h1 data-i18n="nav_compliance">Комплаенс служба</h1><div class="card"><p>Противодействие коррупции и этика.</p></div></section></template>
    <template id="page-contacts">
        <section class="section container" style="position: relative; z-index: 10;">
            <h1 data-i18n="nav_contacts">Контакты</h1>
            <div class="card grid-2">
                <div><p><strong>Адрес:</strong> комплекс «Байконур»</p><p><strong>Сайт:</strong> infracos.kz</p></div>
            </div>
        </section>
    </template>

    <script src="script.js"></script>
</body>
</html>
